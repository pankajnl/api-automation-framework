version: 2.1

jobs:
  build:
    docker:
      - image: cimg/openjdk:17.0

    steps:
      - checkout

      - run:
          name: Run API tests and generate cucumber report
          command: mvn clean verify -Dcucumber.filter.tags="@email_validation"

      - store_artifacts:
          path: target

workflows:
  version: 2
  build_and_test:
    jobs:
      - build